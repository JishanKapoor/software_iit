<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Assign Resource</title>
    <script src="https://cdn.tailwindcss.com"></script>    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="goHome()">
                <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                <div><h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1><p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p></div>
            </div>
            <div class="flex items-center space-x-4 relative">
                <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                    <div class="relative"><i class="fas fa-bell text-xl"></i><span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></span></div>
                    <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                </button>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div class="flex items-center gap-3 cursor-default">
                    <div class="text-right hidden sm:block"><p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p><p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p></div>
                    <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </div>
        <nav class="bg-slate-50 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs"><a href="dashboard-resident.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-home mr-1.5 text-base"></i> Portal</a><a href="support-contact.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-headset mr-1.5 text-base"></i> Support</a></div>
        </nav>
    </header>
        <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full max-w-5xl space-y-6">
            <div class="flex items-center space-x-4 mb-2">
                <a href="dashboard-admin.html" class="w-8 h-8 rounded-md border border-slate-300 bg-white shadow-sm flex justify-center items-center text-slate-500 hover:text-slate-900 transition"><i class="fas fa-arrow-left text-sm"></i></a>
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Resource Dispatch</h2>
            </div>
            <div id="assignContent"></div>
        </main>
    </div>
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>
    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (function() {
            const user = requireAuth('Admin');
            if (!user) return;
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'dashboard-admin.html'; return; }
            const comp = store.complaints.find(c => c.id === id);
            if (!comp) { showToast('Ticket not found.', 'error'); setTimeout(() => window.history.back(), 1000); return; }
            const container = document.getElementById('assignContent');
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="lg:w-2/3 bg-white rounded-lg shadow-sm border border-slate-200 p-6 md:p-8">
                        <h3 class="text-[10px] uppercase font-bold text-slate-400 mb-6 tracking-wider border-b border-slate-100 pb-3">Incident Briefing</h3>
                        <div class="grid grid-cols-[140px_1fr] gap-y-5 text-sm">
                            <span class="font-bold text-slate-500">System ID</span><span class="font-bold text-slate-900">${comp.id}</span>
                            <span class="font-bold text-slate-500">Current State</span><div><span class="status-pill status-${comp.status.replace(' ','')}">${comp.status}</span></div>
                            <span class="font-bold text-slate-500">Originator</span><span class="font-bold text-slate-800">${comp.resident}</span>
                            <span class="font-bold text-slate-500">Classification</span><span class="text-slate-800 font-medium">${comp.category} - ${comp.subCategory}</span>
                            <span class="font-bold text-slate-500">Description Log</span>
                            <div class="bg-slate-50 p-4 rounded-md border border-slate-200 text-slate-700 text-sm mt-1 leading-relaxed font-medium">${comp.description}</div>
                        </div>
                    </div>
                    <div class="lg:w-1/3">
                        <div class="bg-slate-50 rounded-lg shadow-inner border border-slate-200 p-6 md:p-8 sticky top-24">
                            <h3 class="font-bold text-slate-900 mb-5 text-sm uppercase tracking-wide">Dispatch Config</h3>
                            <form id="assignForm">
                                <div class="mb-5">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">Available Personnel <span class="text-rose-500">*</span></label>
                                    <select id="staffSelect" class="form-select w-full border border-slate-300 p-2.5 rounded-md text-sm bg-white font-bold text-slate-800" required>
                                        <option value="" disabled selected>Select technician...</option>
                                        ${store.staffList.map(s => `<option value="${s.name}">${s.name} (${s.trade})</option>`).join('')}
                                    </select>
                                </div>
                                <div class="mb-6">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">Dispatch Instructions (Internal)</label>
                                    <textarea rows="3" placeholder="Add specific SLA instructions..." class="form-textarea w-full border border-slate-300 p-2.5 rounded-md text-sm bg-white resize-none font-medium"></textarea>
                                </div>
                                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-md shadow-sm transition flex justify-center items-center text-sm">Execute Dispatch</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('assignForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const staff = document.getElementById('staffSelect').value;
                if (!staff) { showToast('Please select a technician.', 'error'); return; }
                comp.assignedTo = staff;
                if (['Open','Reopened'].includes(comp.status)) comp.status = 'Assigned';
                comp.history.push({ date: getFormattedDate(), action: 'Dispatch Command', remark: 'Assigned to ' + staff });
                store.notifications.unshift({
                    id: Date.now(),
                    title: 'New Assignment',
                    text: 'You have been dispatched to ' + comp.id + '.',
                    time: 'Just now',
                    read: false,
                    type: 'ticket',
                    icon: 'fas fa-ticket-alt text-indigo-500',
                    ticketId: comp.id
                });
                showToast('Successfully dispatched to ' + staff);
                setTimeout(() => { window.location.href = 'dashboard-admin.html'; }, 800);
            });
        })();
    </script>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('border-indigo-600', 'text-indigo-700');
                    link.classList.remove('border-transparent', 'text-slate-500');
                }
            });
        });
        </script>
        </body>
</html>
