<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <main class="flex-grow w-full h-screen flex justify-center items-center">
            <div class="bg-white shadow-xl rounded-none flex flex-col md:flex-row w-full h-full overflow-hidden border-0">
                <!-- Form Section -->
                <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center">
                    <div class="mb-6">
                        <h2 class="font-extrabold text-2xl text-slate-900 tracking-tight mb-1">Request Access</h2>
                        <p class="text-sm text-slate-500 font-medium">Register as a new resident.</p>
                    </div>
                    <form id="registerForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">First Name</label><input type="text" id="regFirst" class="form-input w-full border border-slate-300 p-2 rounded-md text-sm" required /></div>
                            <div><label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Last Name</label><input type="text" id="regLast" class="form-input w-full border border-slate-300 p-2 rounded-md text-sm" required /></div>
                        </div>
                        <div><label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Unit Number</label><input type="text" id="regUnit" class="form-input w-full border border-slate-300 p-2 rounded-md text-sm" required /></div>
                        <div><label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Email</label><input type="email" id="regEmail" class="form-input w-full border border-slate-300 p-2 rounded-md text-sm" required /></div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-md transition shadow-sm mt-4">Submit Application</button>
                    </form>
                    <div class="mt-6 text-center text-sm font-medium">
                        <a href="../index.html" class="text-slate-500 hover:text-slate-900 transition"><i class="fas fa-arrow-left mr-1"></i> Back to Login</a>
                    </div>
                </div>
                <!-- Info/Branding Section -->
                <div class="w-full md:w-1/2 bg-slate-900 text-white p-8 md:p-12 relative overflow-hidden flex flex-col justify-between">
                    <div class="absolute -right-20 -bottom-20 opacity-5 pointer-events-none"><i class="fas fa-city text-[300px]"></i></div>
                    <div class="relative z-10 mb-8">
                        <div class="mb-6">
                            <img src="../images/logo.svg" alt="Smart Society Logo" class="w-12 h-12 rounded-lg shadow-md" />
                        </div>
                        <h3 class="font-extrabold text-2xl mb-3 leading-snug tracking-tight">Join the Community</h3>
                        <p class="text-slate-400 text-sm leading-relaxed">Submit your details and our admin team will verify your residency and grant access.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>
    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showToast('Request submitted. You will be notified upon approval.', 'success');
            setTimeout(() => { window.location.href = '../index.html'; }, 1500);
        });
    </script>
</body>
</html>
