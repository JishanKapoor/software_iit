<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Ticket Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800 font-sans">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="goHome()">
                <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                <div><h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1><p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p></div>
            </div>
            <div class="flex items-center space-x-4 relative">
                <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                    <div class="relative"><i class="fas fa-bell text-xl"></i><span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></span></div>
                    <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                </button>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div class="flex items-center gap-3 cursor-default">
                    <div class="text-right hidden sm:block"><p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p><p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p></div>
                    <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </div>
        <nav class="bg-slate-50 border-t border-slate-200">
            <!-- Dynamically populated nav -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs"></div>
        </nav>
    </header>
    
    <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
        <!-- Top Action Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 md:px-6 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="goHome()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition"><i class="fas fa-arrow-left text-lg"></i></button>
                <div>
                    <div class="flex flex-wrap items-center gap-3">
                        <h2 id="ticketIdDisplay" class="font-bold text-xl text-slate-900 tracking-tight"></h2>
                        <span class="text-slate-400 text-xl mx-1">|</span>
                        <span id="residentNameDisplay" class="font-bold text-lg text-slate-700"></span>
                        <span id="statusPill" class="px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-widest ml-2"></span>
                        <span id="priorityPill" class="px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-widest"></span>
                    </div>
                    <p id="ticketCategoryDisplay" class="text-sm text-slate-500 mt-1 font-medium"></p>
                </div>
            </div>
            <div id="actionBar" class="flex flex-wrap items-center gap-2 w-full md:w-auto"></div>
        </div>
                 
        <!-- Main Content Area: Tabs -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 flex flex-col bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden min-h-[500px]">
                
                <!-- Tab Headers -->
                <div class="flex border-b border-slate-200 bg-slate-50 px-4 pt-4 gap-6">
                    <button onclick="switchTab('details')" id="tab-details" class="pb-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-700 transition">
                        <i class="fas fa-file-alt mr-2"></i> Overview & Media
                    </button>
                    <button onclick="switchTab('messages')" id="tab-messages" class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition">
                        <i class="fas fa-comments mr-2"></i> Discussions
                    </button>
                </div>

                <!-- Tab 1: Overview & Media -->
                <div id="content-details" class="p-6 space-y-8 flex-grow">
                    <div>
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Full Description</h3>
                        <div id="ticketDescriptionDisplay" class="text-slate-700 text-sm leading-relaxed bg-slate-50 p-5 rounded-lg border border-slate-100 whitespace-pre-wrap"></div>
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Attached Evidence</h3>
                            <!-- Staff have full access to this upload media button -->
                            <button id="addMediaBtn" onclick="document.getElementById('residentMediaUpload').click()" class="text-xs bg-white border border-slate-200 text-slate-600 hover:text-indigo-600 px-3 py-1.5 rounded-md font-bold shadow-sm transition flex items-center">
                                <i class="fas fa-plus mr-1.5"></i> Add Media
                            </button>
                            <input type="file" id="residentMediaUpload" class="hidden" onchange="handleMediaUpload(this)" />
                        </div>
                        <div id="mediaGallery" class="flex gap-4 overflow-x-auto pb-2">
                            <div class="w-32 h-24 rounded-lg border border-slate-200 overflow-hidden shadow-sm flex-shrink-0">
                                <img src="https://images.unsplash.com/photo-1585909695284-32d2985ac9c0?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Evidence" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 2: Chat / Discussions -->
                <div id="content-messages" class="hidden flex-col h-full flex-grow">
                    <div class="flex-grow p-6 overflow-y-auto bg-slate-50 space-y-6 max-h-[400px]" id="chatContainer">
                        <!-- Chat messages appended here -->
                    </div>
                    <div class="p-4 bg-white border-t border-slate-200">
                        <form id="messageForm" class="flex gap-3">
                            <input id="chatInput" type="text" class="w-full border border-slate-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="Type your message..." required />
                            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-md font-bold shadow-sm transition">Send</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Meta Sidebar -->
            <div class="space-y-6">
                <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                    <h3 class="text-sm font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Assignment Data</h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Logged By</p>
                            <p id="loggedByName" class="text-sm font-bold text-slate-800"></p>
                            <p id="loggedByDate" class="text-xs text-slate-500"></p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Location</p>
                            <p id="sideLocation" class="text-sm font-medium text-slate-800"></p>
                        </div>
                        <div id="assignmentBlock" class="bg-indigo-50 border border-indigo-100 rounded-lg p-3 hidden">
                            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1">Assigned To</p>
                            <p id="assigneeName" class="text-sm font-bold text-slate-900"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden flex items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 text-white">
        <i class="fas fa-info-circle mr-3 text-lg"></i><span id="toastMsg" class="font-medium text-sm"></span>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        let currentTicket = null;
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => { 
            renderNav();
            currentUser = requireAuth();
            if (!currentUser) return;
                         
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRoleFlat').textContent = currentUser.role;
            
            // Admins don't need to upload media logs usually
            if (currentUser.role === 'Admin') {
                const mediaBtn = document.getElementById('addMediaBtn');
                if(mediaBtn) mediaBtn.style.display = 'none';
            }

            const params = new URLSearchParams(window.location.search);
            currentTicket = store.complaints.find(c => c.id === params.get('id'));
                         
            if (!currentTicket) {
                alert("Ticket not found.");
                goHome();
                return;
            }
            
            renderTicketData();
            renderActionBar();
                         
            appendMessage("Please send someone fast, the dripping is getting worse.", "John Doe", "Resident", "09:15 AM");
            appendMessage("Hi John, we have assigned a plumber to this.", "System Administrator", "Admin", "10:48 AM");
        });

        function renderTicketData() {
            document.getElementById('ticketIdDisplay').textContent = currentTicket.id;
            const residentNameClean = currentTicket.resident.split(' (')[0];
            document.getElementById('residentNameDisplay').textContent = residentNameClean;
            document.getElementById('loggedByName').textContent = currentTicket.resident;
            document.getElementById('ticketCategoryDisplay').textContent = currentTicket.category + " - " + currentTicket.subCategory;
            document.getElementById('ticketDescriptionDisplay').textContent = currentTicket.description;
                         
            const sp = document.getElementById('statusPill');
            sp.textContent = currentTicket.status;
            sp.className = "px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-widest status-" + currentTicket.status.replace(' ','');
                         
            const pp = document.getElementById('priorityPill');
            pp.textContent = currentTicket.priority + ' Priority';
            pp.className = "px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-widest pri-" + currentTicket.priority;
            
            document.getElementById('loggedByDate').textContent = currentTicket.date;
            document.getElementById('sideLocation').textContent = currentTicket.location;
            
            if (currentTicket.assignedTo) {
                document.getElementById('assigneeName').textContent = currentTicket.assignedTo;
                document.getElementById('assignmentBlock').classList.remove('hidden');
            }
        }
                 
        function switchTab(tabId) {
            document.getElementById('content-details').classList.add('hidden');
            document.getElementById('content-details').classList.remove('flex');
            document.getElementById('content-messages').classList.add('hidden');
            document.getElementById('content-messages').classList.remove('flex');
            
            const tDetails = document.getElementById('tab-details');
            const tMessages = document.getElementById('tab-messages');
            tDetails.classList.remove('border-indigo-600', 'text-indigo-700');
            tDetails.classList.add('border-transparent', 'text-slate-500');
            tMessages.classList.remove('border-indigo-600', 'text-indigo-700');
            tMessages.classList.add('border-transparent', 'text-slate-500');
            
            const activeContent = document.getElementById('content-' + tabId);
            activeContent.classList.remove('hidden');
            if(tabId === 'messages') {
                activeContent.classList.add('flex');
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            
            const activeTab = document.getElementById('tab-' + tabId);
            activeTab.classList.remove('border-transparent', 'text-slate-500');
            activeTab.classList.add('border-indigo-600', 'text-indigo-700');
        }

        function appendMessage(text, fromName, fromRole, timeStr) {
            const chatContainer = document.getElementById('chatContainer');
            const isMe = (fromRole === currentUser.role) || (fromName === currentUser.name);
                         
            const bgClass = isMe ? 'bg-indigo-600 text-white' : 'bg-white border-slate-200 text-slate-700';
            const layoutClass = isMe ? 'ml-auto flex-row-reverse' : '';
            const textAlignment = isMe ? 'items-end' : 'items-start';
            const displayName = isMe ? 'You' : fromName;
            
            chatContainer.insertAdjacentHTML('beforeend', `
                <div class="flex gap-4 max-w-lg ${layoutClass} mb-4">
                    <div class="flex flex-col ${textAlignment}">
                        <div class="flex items-baseline gap-2 mb-1">
                            <span class="text-xs font-bold text-slate-900">${displayName}</span>
                            <span class="text-[9px] text-slate-400">${timeStr}</span>
                        </div>
                        <div class="${bgClass} border p-3 rounded-lg text-sm shadow-sm text-left">
                            ${text}
                        </div>
                    </div>
                </div>
            `);
        }

        document.getElementById('messageForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text === '') return;
                         
            const tStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            appendMessage(text, currentUser.name, currentUser.role, tStr);
            input.value = '';
                         
            const chatContainer = document.getElementById('chatContainer');
            setTimeout(() => chatContainer.scrollTop = chatContainer.scrollHeight, 50);
        });

        function renderActionBar() {
            const actionBar = document.getElementById('actionBar');
            let btnHTML = `<button onclick="window.print()" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-md hover:bg-slate-50 text-xs font-bold shadow-sm transition"><i class="fas fa-print mr-1"></i> Print</button>`;
                         
            if (currentUser.role === 'Admin') {
                btnHTML += `<button onclick="handleAdmin('reassign')" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-md hover:bg-slate-50 text-xs font-bold shadow-sm transition"><i class="fas fa-exchange-alt mr-1"></i> Reassign</button>
                            <button onclick="handleAdmin('resolve')" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-xs font-bold shadow-sm transition"><i class="fas fa-check mr-1"></i> Close</button>`;
            } else if (currentUser.role === 'Staff' && ['Assigned', 'In Progress'].includes(currentTicket.status)) {
                btnHTML += `<button onclick="handleStaff('progress')" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-md hover:bg-slate-50 text-xs font-bold shadow-sm transition">Log Progress</button>
                            <button onclick="handleStaff('complete')" class="px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 text-xs font-bold shadow-sm transition">Mark Complete</button>`;
            }
            actionBar.innerHTML = btnHTML;
        }

        function handleAdmin(action) {
            if (action === 'reassign' && prompt("Enter new staff member name:")) {
                showToast("Ticket reassigned.");
            } else if (action === 'resolve' && confirm("Force close this ticket?")) {
                currentTicket.status = 'Closed';
                currentTicket.history.push({ date: getFormattedDate(), action: 'Administratively Closed' });
                renderTicketData();
                renderActionBar();
                showToast("Ticket closed.");
            }
        }

        function handleStaff(action) {
            if (action === 'progress') {
                const note = prompt("Enter progress notes:");
                if (note) {
                    currentTicket.status = 'In Progress';
                    currentTicket.history.push({ date: getFormattedDate(), action: 'Status Update: In Progress', remark: note });
                    
                    const tStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    appendMessage("System Note: " + note, currentUser.name, currentUser.role, tStr);
                    
                    renderTicketData();
                    renderActionBar();
                    showToast("Progress logged.");
                }
            } else if (action === 'complete' && confirm("Mark this job as complete?")) {
                currentTicket.status = 'Resolved';
                currentTicket.history.push({ date: getFormattedDate(), action: 'Work Completed (Pending Sign-off)' });
                
                // Add notification to system for admin/resident
                store.notifications.unshift({
                    id: Date.now(),
                    title: 'Ticket Resolved',
                    text: currentTicket.id + ' fixed. Awaiting verification.',
                    time: 'Just now',
                    read: false,
                    type: 'ticket',
                    icon: 'fas fa-ticket-alt text-indigo-500',
                    ticketId: currentTicket.id
                });
                
                renderTicketData();
                renderActionBar();
                showToast("Work marked complete.");
            }
        }

        function handleMediaUpload(input) {
            if (input.files && input.files[0]) {
                showToast("Media attached successfully!");
                const gal = document.getElementById('mediaGallery');
                gal.innerHTML += `<div class="w-32 h-24 rounded-lg bg-slate-100 border border-slate-200 shadow-sm flex items-center justify-center flex-shrink-0"><i class="fas fa-file-image text-slate-400 text-2xl"></i></div>`;
            }
        }
    </script>
</body>
</html>
