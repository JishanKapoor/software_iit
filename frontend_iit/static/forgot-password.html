<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <main class="flex-grow w-full h-screen flex justify-center items-center">
            <div class="bg-white shadow-xl rounded-none flex flex-col md:flex-row w-full h-full overflow-hidden border-0">
                <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center">
                    <div class="mb-8">
                        <h2 class="font-extrabold text-2xl text-slate-900 tracking-tight mb-1">Reset Password</h2>
                        <p class="text-sm text-slate-500 font-medium">Enter your email to receive password recovery instructions.</p>
                    </div>
                    <form id="forgotForm" class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Email Address</label>
                            <input id="forgotEmail" type="email" placeholder="your.email@example.com" class="form-input w-full border border-slate-300 p-2.5 rounded-md text-sm text-slate-900 transition" required />
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-md transition shadow-sm mt-2">Send Recovery Link</button>
                    </form>
                    <div class="mt-8 text-center text-sm font-medium border-t border-slate-100 pt-6">
                        <span class="text-slate-500">Remember your password?</span>
                        <a href="../index.html" class="text-indigo-600 font-bold hover:text-indigo-800 transition ml-1">Back to Login</a>
                    </div>
                </div>
                <div class="w-full md:w-1/2 bg-slate-900 text-white p-8 md:p-12 relative overflow-hidden flex flex-col justify-between">
                    <div class="absolute -right-20 -bottom-20 opacity-5 pointer-events-none"><i class="fas fa-city text-[300px]"></i></div>
                    <div class="relative z-10 mb-8">
                        <div class="mb-6">
                            <img src="../images/logo.svg" alt="Smart Society Logo" class="w-12 h-12 rounded-lg shadow-md" />
                        </div>
                        <h3 class="font-extrabold text-2xl mb-3 leading-snug tracking-tight">Password Recovery</h3>
                        <p class="text-slate-400 text-sm leading-relaxed">We'll send a secure recovery link to your registered email address. Click the link to reset your password.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>
    <script src="../js/utils.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            showToast('Recovery link sent to ' + email + '. Please check your inbox.', 'success');
            setTimeout(() => { window.location.href = '../index.html'; }, 2000);
        });
    </script>
</body>
</html>
