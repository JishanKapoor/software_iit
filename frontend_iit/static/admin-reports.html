<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Search Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="goHome()">
                <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                <div><h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1><p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p></div>
            </div>
            <div class="flex items-center space-x-4 relative">
                <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                    <div class="relative"><i class="fas fa-bell text-xl"></i><span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></span></div>
                    <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                </button>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div class="flex items-center gap-3 cursor-default">
                    <div class="text-right hidden sm:block"><p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p><p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p></div>
                    <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </div>
        <nav class="bg-slate-50 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs"><a href="dashboard-admin.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-chart-pie mr-1.5 text-base"></i> Portal</a><a href="admin-staff.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-users mr-1.5 text-base"></i> Staff</a><a href="messages.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-comments mr-1.5 text-base"></i> Messages</a></div>
        </nav>
    </header>

        <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
                    <div>
                        <h2 class="text-xl font-extrabold text-slate-900 tracking-tight">Search Database</h2>
                        <p class="text-xs text-slate-500 mt-1 font-medium">Find any service request by ID, resident, or trade.</p>
                    </div>
                    <button onclick="exportData()" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-bold text-xs px-4 py-2.5 rounded-md shadow-sm transition flex items-center">
                        <i class="fas fa-download mr-2 text-indigo-500"></i> Export CSV / PDF
                    </button>
                </div>

                <!-- Filter Bar -->
                <div class="bg-white p-5 border-b border-slate-200 flex flex-wrap gap-4 items-end">
                    <div class="flex-grow md:max-w-xs">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Search</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                            <input id="searchInput" type="text" placeholder="Search ID, Name, Trade..." class="form-input w-full border border-slate-300 pl-9 p-2 rounded-md text-sm font-medium" />
                        </div>
                    </div>
                    <div class="w-full sm:w-auto">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Lifecycle Status</label>
                        <select id="statusFilter" class="form-select w-full border border-slate-300 p-2 rounded-md text-sm min-w-[140px] bg-white font-medium text-slate-700">
                            <option value="">All States</option>
                            <option>Open</option><option>Reopened</option><option>Assigned</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
                        </select>
                    </div>
                    <div class="w-full sm:w-auto">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Date Range Start</label>
                        <input type="date" class="form-input w-full border border-slate-300 p-2 rounded-md text-sm bg-white font-medium text-slate-500" />
                    </div>
                    <button id="clearFiltersBtn" class="px-3 py-2 text-xs font-bold text-slate-500 hover:text-slate-900 transition underline underline-offset-2">Clear Filters</button>
                </div>

                <!-- Data Grid -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Ref ID</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Date Logged</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Resident Info</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Trade</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Technician</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Lifecycle State</th>
                                <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (function() {
            const user = requireAuth('Admin');
            if (!user) return;

            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRoleFlat').textContent = user.role;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);

            function renderTable() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const status = document.getElementById('statusFilter').value;
                const filtered = store.complaints.filter(c => {
                    const matchSearch = c.id.toLowerCase().includes(search) ||
                                       c.resident.toLowerCase().includes(search) ||
                                       c.category.toLowerCase().includes(search) ||
                                       (c.assignedTo && c.assignedTo.toLowerCase().includes(search));
                    const matchStatus = status === '' || c.status === status;
                    return matchSearch && matchStatus;
                });
                const tbody = document.getElementById('reportTableBody');
                if (filtered.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-12 text-center text-slate-500 text-sm font-medium"><i class="fas fa-search text-3xl text-slate-300 mb-3 block"></i> No records match current parameters.</td></tr>`;
                } else {
                    tbody.innerHTML = filtered.map(c => `
                        <tr class="hover:bg-slate-50 transition duration-150">
                            <td class="px-5 py-3 font-bold text-slate-800 text-sm whitespace-nowrap">${c.id}</td>
                            <td class="px-5 py-3 text-xs font-medium text-slate-600 whitespace-nowrap">${c.date.split(' ')[0]}</td>
                            <td class="px-5 py-3 text-sm font-semibold text-slate-700">${c.resident}</td>
                            <td class="px-5 py-3 text-sm font-medium text-slate-600">${c.category}</td>
                            <td class="px-5 py-3 text-sm font-bold ${c.assignedTo ? 'text-indigo-700' : 'text-slate-400 italic'}">${c.assignedTo || '--'}</td>
                            <td class="px-5 py-3 whitespace-nowrap"><span class="status-pill text-[9px] status-${c.status.replace(' ','')}">${c.status}</span></td>
                            <td class="px-5 py-3 text-right whitespace-nowrap"><button onclick="viewComplaint('${c.id}','admin-reports.html')" class="text-indigo-600 hover:text-indigo-900 text-[10px] uppercase tracking-wide font-bold">Open Record</button></td>
                        </tr>
                    `).join('');
                }
            }

            document.getElementById('searchInput').addEventListener('input', renderTable);
            document.getElementById('statusFilter').addEventListener('change', renderTable);
            document.getElementById('clearFiltersBtn').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                document.getElementById('statusFilter').value = '';
                renderTable();
            });
            renderTable();

            window.exportData = function() {
                showToast('PDF/CSV Report compiling...', 'success');
            };

            updateUnreadBadge();
        })();
    </script>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('border-indigo-600', 'text-indigo-700');
                    link.classList.remove('border-transparent', 'text-slate-500');
                }
            });
        });
        </script>
        </body>
</html>
