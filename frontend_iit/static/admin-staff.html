<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Staff Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800 font-sans">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="goHome()">
                <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                <div><h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1><p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p></div>
            </div>
            <div class="flex items-center space-x-4 relative">
                <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                    <div class="relative"><i class="fas fa-bell text-xl"></i><span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></span></div>
                    <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                </button>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div class="flex items-center gap-3 cursor-default">
                    <div class="text-right hidden sm:block"><p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p><p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p></div>
                    <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </div>
        <nav class="bg-slate-50 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs">
                <a href="dashboard-admin.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-chart-pie mr-1.5 text-base"></i> Portal</a>
                <a href="admin-staff.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-users mr-1.5 text-base"></i> Staff</a>
                <a href="messages.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-comments mr-1.5 text-base"></i> Messages</a>
            </div>
        </nav>
    </header>
    
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>

    <main id="staffApp" class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
        <div class="flex items-center justify-between mb-2">
            <div>
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Staff Directory & Security</h2>
                <p class="text-sm text-slate-500 mt-1 font-medium">Manage maintenance personnel and system credentials.</p>
            </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-200 bg-slate-50">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Provision New Account</h3>
                <div class="flex flex-col sm:flex-row gap-3 items-end">
                    <div class="w-full sm:w-1/4">
                        <label class="block text-[10px] font-bold text-slate-700 mb-1">Full Name</label>
                        <input v-model="newStaff.name" type="text" placeholder="e.g. Sarah Connor" class="w-full border border-slate-300 p-2 rounded-md text-sm">
                    </div>
                    <div class="w-full sm:w-1/4">
                        <label class="block text-[10px] font-bold text-slate-700 mb-1">Trade/Role</label>
                        <select v-model="newStaff.trade" class="w-full border border-slate-300 p-2 rounded-md text-sm">
                            <option disabled value="">Select Trade...</option>
                            <option>Plumber</option><option>Electrician</option><option>Carpenter</option><option>Janitorial</option><option>Security</option>
                        </select>
                    </div>
                    <div class="w-full sm:w-1/4">
                        <label class="block text-[10px] font-bold text-slate-700 mb-1">Username</label>
                        <input v-model="newStaff.username" type="text" placeholder="username" class="w-full border border-slate-300 p-2 rounded-md text-sm">
                    </div>
                    <div class="w-full sm:w-1/4">
                        <label class="block text-[10px] font-bold text-slate-700 mb-1">Password</label>
                        <input v-model="newStaff.password" type="password" placeholder="password" class="w-full border border-slate-300 p-2 rounded-md text-sm">
                    </div>
                    <button @click="addStaff" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2.5 rounded-md text-sm shadow-sm transition h-[38px] w-full sm:w-auto">Add</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white border-b border-slate-200">
                        <tr>
                            <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Personnel</th>
                            <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Trade</th>
                            <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Username</th>
                            <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider w-48">Password Control</th>
                            <th class="px-5 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white">
                        <tr v-for="(staff, index) in staffList" :key="index" class="hover:bg-slate-50 transition">
                            <td class="px-5 py-4 text-sm font-bold text-slate-800">{{ staff.name }}</td>
                            <td class="px-5 py-4 text-sm font-medium text-slate-600"><span class="bg-slate-100 px-2 py-1 rounded text-xs border border-slate-200">{{ staff.trade }}</span></td>
                            <td class="px-5 py-4 text-sm font-mono text-slate-600">{{ staff.username }}</td>
                            <td class="px-5 py-4">
                                <div class="flex items-center gap-2">
                                    <input :type="staff.showPassword ? 'text' : 'password'" v-model="staff.password" @change="saveData" class="w-full border border-slate-300 p-1.5 rounded text-xs font-mono bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition">
                                    <button @click="staff.showPassword = !staff.showPassword" class="text-slate-400 hover:text-indigo-600 transition" :title="staff.showPassword ? 'Hide Password' : 'Show Password'">
                                        <i class="fas" :class="staff.showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                                    </button>
                                </div>
                            </td>
                            <td class="px-5 py-4 text-right">
                                <button @click="removeStaff(index)" class="text-rose-600 hover:text-rose-800 text-xs font-bold uppercase tracking-wide bg-rose-50 px-3 py-1.5 rounded border border-rose-100 transition">Remove</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const staffList = ref(window.store ? window.store.staffList : []);
                const newStaff = ref({ name: '', trade: '', username: '', password: '', showPassword: false });
                
                const saveData = () => {
                    if(window.store) {
                        // FIX: Unwrap Vue proxies securely using stringify/parse to prevent LocalStorage corruption
                        window.store.staffList = JSON.parse(JSON.stringify(staffList.value));
                        window.store.saveStaff();
                        if(window.showToast) showToast('Credentials updated successfully.', 'success');
                    }
                };
                
                const addStaff = () => {
                    if(newStaff.value.name && newStaff.value.trade && newStaff.value.username && newStaff.value.password) {
                        // Trim extra spaces dynamically to avoid trailing space log-in bugs
                        newStaff.value.username = newStaff.value.username.trim();
                        newStaff.value.password = newStaff.value.password.trim();
                        
                        staffList.value.unshift({ ...newStaff.value });
                        newStaff.value = { name: '', trade: '', username: '', password: '', showPassword: false };
                        saveData();
                    } else {
                        if(window.showToast) showToast('Please fill out all fields.', 'error');
                        else alert('Please fill out all fields.');
                    }
                };
                
                const removeStaff = (idx) => {
                    if(confirm('Are you sure you want to delete this staff member? This will revoke their system access.')) {
                        staffList.value.splice(idx, 1);
                        saveData();
                    }
                };
                
                return { staffList, newStaff, addStaff, removeStaff, saveData };
            }
        }).mount('#staffApp');
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            const user = requireAuth('Admin');
            if(user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userRoleFlat').textContent = user.role;
                document.getElementById('userAvatar').textContent = user.name.charAt(0);
            }
            
            // Fix nav active state
            const currentPath = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('border-indigo-600', 'text-indigo-700');
                    link.classList.remove('border-transparent', 'text-slate-500');
                }
            });
        });
    </script>
</body>
</html>
