<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
                <div class="flex items-center cursor-pointer" onclick="goHome()">
                    <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                    <div>
                        <h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1>
                        <p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4 relative">
                    <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                        <div class="relative">
                            <i class="fas fa-bell text-xl"></i>
                            <span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span>
                            </span>
                        </div>
                        <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                    </button>
                    <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                    <div class="flex items-center gap-3 cursor-default">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p>
                            <p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p>
                        </div>
                        <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                    </div>
                    <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </div>
            
            <nav class="bg-slate-50 border-t border-slate-200">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs">
                    </div>
            </nav>
        </header>

        <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full max-w-4xl space-y-6">
            <div class="flex items-center space-x-4 mb-2">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Messages</h2>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wide mb-4">Send New Message</h3>
                <form id="messageForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Recipient</label>
                        <select id="recipientSelect" class="form-select w-full border border-slate-300 p-2.5 rounded-md text-sm bg-white font-medium" required>
                            <option value="" disabled selected>Select recipient...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Message</label>
                        <textarea id="messageText" rows="3" placeholder="Type your message here..." class="form-textarea w-full border border-slate-300 p-3 rounded-md text-sm resize-none font-medium" required></textarea>
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-md shadow-sm transition text-sm">Send</button>
                </form>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wide">Conversation History</h3>
                </div>
                <div class="divide-y divide-slate-100" id="messageList"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (function() {
            const user = requireAuth();
            if (!user) return;

            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRoleFlat').textContent = user.role + (user.flat ? ' | ' + user.flat : '');
            document.getElementById('userAvatar').textContent = user.name.charAt(0);

            // Nav tabs - Dynamically inject matching the classes and layout of dashboard-admin.html
            const navContainer = document.getElementById('navTabs');
            let navHtml = '';
            
            // Base class for all nav links so the active state script works correctly
            const baseClass = "nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition";

            if (user.role === 'Admin') {
                navHtml += `
                    <a href="dashboard-admin.html" class="${baseClass}"><i class="fas fa-chart-pie mr-1.5 text-base"></i> Portal</a>
                    <a href="admin-staff.html" class="${baseClass}"><i class="fas fa-users mr-1.5 text-base"></i> Staff</a>
                    <a href="messages.html" class="${baseClass}"><i class="fas fa-comments mr-1.5 text-base"></i> Messages</a>
                `;
            } else if (user.role === 'Staff') {
                navHtml += `
                    <a href="dashboard-staff.html" class="${baseClass}"><i class="fas fa-clipboard-list mr-1.5 text-base"></i> My Queue</a>
                    <a href="staff-history.html" class="${baseClass}"><i class="fas fa-check-double mr-1.5 text-base"></i> History</a>
                    <a href="messages.html" class="${baseClass}"><i class="fas fa-comments mr-1.5 text-base"></i> Messages</a>
                `;
            } else {
                navHtml += `
                    <a href="dashboard-resident.html" class="${baseClass}"><i class="fas fa-home mr-1.5 text-base"></i> Portal</a>
                    <a href="support-contact.html" class="${baseClass}"><i class="fas fa-headset mr-1.5 text-base"></i> Support</a>
                    <a href="messages.html" class="${baseClass}"><i class="fas fa-comments mr-1.5 text-base"></i> Messages</a>
                `;
            }
            navContainer.innerHTML = navHtml;

            // Recipient dropdown
            const recipientSelect = document.getElementById('recipientSelect');
            const allUsers = [];
            store.staffList.forEach(s => allUsers.push({ name: s.name, role: 'Staff' }));
            allUsers.push({ name: 'System Administrator', role: 'Admin' });
            const residentNames = ['John Doe', 'Jane Smith', 'Alice Johnson'];
            residentNames.forEach(r => allUsers.push({ name: r, role: 'Resident' }));
            
            const currentUserName = user.name;
            const filtered = allUsers.filter(u => u.name !== currentUserName);
            const unique = filtered.filter((v, i, a) => a.findIndex(t => t.name === v.name) === i);
            
            unique.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.name;
                opt.textContent = u.name + ' (' + u.role + ')';
                recipientSelect.appendChild(opt);
            });

            // Render messages
            function renderMessages() {
                const container = document.getElementById('messageList');
                const messages = store.messages.filter(m => m.from === currentUserName || m.to === currentUserName);
                
                if (messages.length === 0) {
                    container.innerHTML = `<div class="p-12 text-center text-slate-500 text-sm font-medium"><i class="fas fa-inbox text-3xl text-slate-300 mb-3 block"></i>No messages yet.</div>`;
                    return;
                }
                
                messages.sort((a, b) => b.timestamp - a.timestamp);
                let html = '';
                
                messages.forEach(m => {
                    const isFromMe = m.from === currentUserName;
                    const bgClass = isFromMe ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-200';
                    const align = isFromMe ? 'text-right' : 'text-left';
                    html += `
                        <div class="p-5 hover:bg-slate-50 transition flex flex-col ${align} border-b border-slate-100">
                            <div class="flex items-center ${isFromMe ? 'justify-end' : 'justify-start'} gap-3 mb-1">
                                <span class="text-xs font-bold text-slate-600">${isFromMe ? 'You' : m.from}</span>
                                <span class="text-[10px] text-slate-400 font-medium">${new Date(m.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="inline-block p-3 rounded-md ${bgClass} border max-w-[80%] ${isFromMe ? 'ml-auto' : 'mr-auto'}">
                                <p class="text-sm text-slate-700">${m.text}</p>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            document.getElementById('messageForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const to = document.getElementById('recipientSelect').value;
                const text = document.getElementById('messageText').value.trim();
                
                if (!to || !text) {
                    showToast('Please select a recipient and enter a message.', 'error');
                    return;
                }
                
                store.messages.push({
                    from: currentUserName,
                    to: to,
                    text: text,
                    timestamp: Date.now(),
                    read: false
                });
                
                store.notifications.unshift({
                    id: Date.now(),
                    title: 'New Message',
                    text: 'You have a new message from ' + currentUserName + '.',
                    time: 'Just now',
                    read: false,
                    type: 'ticket',
                    icon: 'fas fa-envelope text-indigo-500',
                    ticketId: null
                });
                
                showToast('Message sent successfully.');
                document.getElementById('messageText').value = '';
                renderMessages();
                updateUnreadBadge();
            });

            renderMessages();
            updateUnreadBadge();
        })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('border-indigo-600', 'text-indigo-700');
                    link.classList.remove('border-transparent', 'text-slate-500');
                }
            });
        });
    </script>
</body>
</html>
