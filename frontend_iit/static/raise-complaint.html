<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Society | Raise Complaint</title>
    <script src="https://cdn.tailwindcss.com"></script>    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col bg-slate-50">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="goHome()">
                <div class="mr-3"><img src="../images/logo.svg" alt="Smart Society Logo" class="w-8 h-8 rounded-md shadow-sm" /></div>
                <div><h1 class="font-extrabold text-lg text-slate-900 tracking-tight leading-none">Smart Society</h1><p class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest mt-0.5">Complaint Resolution</p></div>
            </div>
            <div class="flex items-center space-x-4 relative">
                <button onclick="toggleNotifications()" class="relative flex items-center text-slate-500 hover:text-indigo-600 transition px-2 py-1.5 rounded-md hover:bg-slate-50">
                    <div class="relative"><i class="fas fa-bell text-xl"></i><span id="unreadBadge" class="absolute -top-1 -right-1 flex h-3 w-3 hidden"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></span></div>
                    <span class="hidden sm:inline-block ml-2 font-bold text-sm">Alerts</span>
                </button>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div class="flex items-center gap-3 cursor-default">
                    <div class="text-right hidden sm:block"><p class="text-sm font-bold text-slate-900 leading-tight" id="userName"></p><p class="text-[0.65rem] text-slate-500 font-bold uppercase tracking-wider mt-0.5" id="userRoleFlat"></p></div>
                    <div class="w-8 h-8 rounded-md bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-200" id="userAvatar">U</div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition p-1.5 rounded-md ml-1" title="Sign Out"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </div>
        <nav class="bg-slate-50 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6 overflow-x-auto" id="navTabs"><a href="dashboard-resident.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-home mr-1.5 text-base"></i> Portal</a><a href="support-contact.html" class="nav-link py-2 px-3 text-xs font-bold text-slate-500 hover:text-slate-900 border-b-2 border-transparent flex items-center transition"><i class="fas fa-headset mr-1.5 text-base"></i> Support</a></div>
        </nav>
    </header>
        <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full max-w-3xl space-y-6">
            <div class="flex items-center space-x-4 mb-2">
                <a href="dashboard-resident.html" class="text-slate-400 hover:text-slate-900 transition"><i class="fas fa-arrow-left text-lg"></i></a>
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Log Service Request</h2>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 md:p-8">
                    <form id="raiseForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Trade Category <span class="text-rose-500">*</span></label>
                                <select id="compCategory" class="form-select w-full border border-slate-300 p-2.5 rounded-md text-sm bg-white font-medium text-slate-700" required>
                                    <option value="" disabled selected>Select category...</option>
                                    <option>Plumbing</option><option>Electrical</option><option>Carpentry</option><option>HVAC</option><option>Janitorial</option><option>Security</option>
                                </select>
                            </div>
                            <div><label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Specific Issue <span class="text-rose-500">*</span></label>
                                <select id="compSubCategory" class="form-select w-full border border-slate-300 p-2.5 rounded-md text-sm bg-white font-medium text-slate-700" required>
                                    <option value="" disabled selected>Select specific issue...</option>
                                    <option>Leakage / Blockage</option><option>Fixture Broken</option><option>Power Outage</option><option>Appliance Malfunction</option><option>Cleaning Required</option><option>Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Impact / Priority <span class="text-rose-500">*</span></label>
                                <div class="flex rounded-md shadow-sm bg-slate-50 border border-slate-200 p-1" role="group">
                                    <label class="flex-1 text-center cursor-pointer relative"><input type="radio" name="priority" value="Low" class="peer sr-only" checked><div class="py-1.5 text-xs font-bold rounded text-slate-500 peer-checked:bg-white peer-checked:text-emerald-700 peer-checked:shadow-sm transition">Low</div></label>
                                    <label class="flex-1 text-center cursor-pointer relative"><input type="radio" name="priority" value="Medium" class="peer sr-only"><div class="py-1.5 text-xs font-bold rounded text-slate-500 peer-checked:bg-white peer-checked:text-amber-700 peer-checked:shadow-sm transition">Medium</div></label>
                                    <label class="flex-1 text-center cursor-pointer relative"><input type="radio" name="priority" value="High" class="peer sr-only"><div class="py-1.5 text-xs font-bold rounded text-slate-500 peer-checked:bg-white peer-checked:text-rose-700 peer-checked:shadow-sm transition">High</div></label>
                                </div>
                            </div>
                            <div><label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Exact Location <span class="text-rose-500">*</span></label>
                                <input id="compLocation" type="text" placeholder="e.g. Master Bath, Kitchen" class="form-input w-full border border-slate-300 p-2.5 rounded-md text-sm font-medium text-slate-700" required />
                            </div>
                        </div>
                        <div><label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Detailed Description <span class="text-rose-500">*</span></label>
                            <textarea id="compDescription" rows="4" placeholder="Provide details to assist the maintenance team..." class="form-textarea w-full border border-slate-300 p-3 rounded-md text-sm font-medium text-slate-700 resize-none" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex justify-end space-x-3">
                    <a href="dashboard-resident.html" class="px-4 py-2 font-bold text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-100 transition shadow-sm">Cancel</a>
                    <button id="submitComplaintBtn" class="px-6 py-2 font-bold text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 shadow-sm transition">Submit Request</button>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center px-4 py-3 rounded-md shadow-lg border bg-slate-900 border-slate-800 text-white">
        <i class="fas fa-check-circle text-emerald-400 mr-3 text-lg"></i>
        <span id="toastMsg" class="font-medium text-sm">Success</span>
    </div>
    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (function() {
            const user = requireAuth('Resident');
            if (!user) return;
            document.getElementById('submitComplaintBtn').addEventListener('click', function() {
                const category = document.getElementById('compCategory').value;
                const subCategory = document.getElementById('compSubCategory').value;
                const priority = document.querySelector('input[name="priority"]:checked').value;
                const location = document.getElementById('compLocation').value.trim();
                const description = document.getElementById('compDescription').value.trim();
                if (!category || !subCategory || !location || !description) {
                    showToast('Please fill all required fields.', 'error');
                    return;
                }
                const newId = 'TKT-' + (1000 + store.complaints.length + 1);
                const flatCode = user.flat ? user.flat.split(' ')[1] : '';
                store.complaints.unshift({
                    id: newId,
                    category: category,
                    subCategory: subCategory,
                    priority: priority,
                    location: location,
                    description: description,
                    status: 'Open',
                    date: getFormattedDate(),
                    resident: user.name + (flatCode ? ' (' + flatCode + ')' : ''),
                    assignedTo: null,
                    history: [{ date: getFormattedDate(), action: 'Request Logged' }],
                    feedback: null
                });
                // Add notification
                store.notifications.unshift({
                    id: Date.now(),
                    title: 'New Urgent Ticket',
                    text: 'Resident raised ' + newId + ' (' + category + ').',
                    time: 'Just now',
                    read: false,
                    type: 'alert',
                    icon: 'fas fa-exclamation-triangle text-rose-500',
                    ticketId: newId
                });
                showToast('Service request created. Ref: ' + newId);
                setTimeout(() => { window.location.href = 'dashboard-resident.html'; }, 800);
            });
        })();
    </script>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('border-indigo-600', 'text-indigo-700');
                    link.classList.remove('border-transparent', 'text-slate-500');
                }
            });
        });
        </script>
        </body>
</html>
